# Minimal example — control a Duravit SensoWash over BLE from an ESP32-S3.
#
# This pulls the component straight from GitHub, so you can copy this file into your own
# ESPHome setup as-is. Copy secrets.yaml.example -> secrets.yaml and fill in your values first.
# For the full set of entities and the optional tablet dashboard, see config.yaml.

substitutions:
  name: sensowash-bridge
  friendly_name: SensoWash Bridge

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none   # keep WiFi power-save off so it doesn't fight BLE

api:
logger:
ota:
  - platform: esphome
    password: !secret ota_password

# Pull the component from GitHub. Pin to a release tag for reproducible builds.
external_components:
  - source: github://darrenweake/esphome-sensowash@v0.28
    components: [sensowash_serial]
    refresh: never

esp32_ble_tracker:

ble_client:
  - mac_address: !secret toilet_mac
    id: sensowash_ble
    auto_connect: true

sensowash_serial:
  id: sensowash
  ble_client_id: sensowash_ble
  handshake_key: !secret handshake_key   # comment out to enrol on first pairing (see README)

# A representative subset of the available entities — see config.yaml for the full list.
button:
  - platform: sensowash_serial
    sensowash_serial_id: sensowash
    lid_toggle:
      name: "Toilet Lid Toggle"
    rear_wash:
      name: "Rear Wash"
    lady_wash:
      name: "Lady Wash"
    wash_stop:
      name: "Stop Wash"

select:
  - platform: sensowash_serial
    sensowash_serial_id: sensowash
    seat_temperature:
      name: "Seat Temperature"
    dryer:
      name: "Dryer"

switch:
  - platform: sensowash_serial
    sensowash_serial_id: sensowash
    energy_saving:
      name: "Energy Saving"

sensor:
  - platform: sensowash_serial
    sensowash_serial_id: sensowash
    ble_rssi:
      name: "Toilet BLE Signal"

binary_sensor:
  - platform: sensowash_serial
    sensowash_serial_id: sensowash
    seat_occupied:
      name: "Seat Occupied"
      device_class: occupancy

text_sensor:
  - platform: sensowash_serial
    sensowash_serial_id: sensowash
    serial_number:
      name: "Serial Number"
    fault_codes:
      name: "Fault Codes"
