substitutions:
  build_version: "0.29"
  led_pin: GPIO48   # onboard addressable RGB LED (ESP32-S3-DevKitC-1 = GPIO48; some clones use GPIO38)

esphome:
  name: sensowash-bridge
  friendly_name: SensoWash Bridge
  project:
    name: "sensowash.bridge"
    version: "${build_version}"

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB   # N16R8 board is 16MB; default 4MB left ~12MB unpartitioned. Dual 7.75MB OTA slots.
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: none   # avoid WiFi power-save interfering with BLE coexistence

api:
logger:
  level: DEBUG
  logs:
    esp32_ble_tracker: INFO   # quiet per-advertisement spam
    sensor: INFO
ota:
  - platform: esphome
    password: !secret ota_password

# REST API + /events SSE stream that the custom dashboard drives. include_internal exposes
# entities marked `internal: true` (helper/raw entities) to the dashboard while keeping them
# out of Home Assistant — so HA shows clean entities and the dashboard keeps its richer controls.
web_server:
  version: 2
  port: 80
  include_internal: true

# Custom tablet-styled dashboard served at http://sensowash-bridge.local/
web_dashboard:

# Onboard addressable RGB LED, driven by the component as a Bluetooth status indicator.
light:
  - platform: esp32_rmt_led_strip
    id: status_led
    pin: ${led_pin}
    num_leds: 1
    chipset: WS2812
    rgb_order: GRB
    internal: true
    restore_mode: ALWAYS_OFF
    default_transition_length: 0s

esp32_ble_tracker:

ble_client:
  - mac_address: !secret toilet_mac
    id: sensowash_ble
    # ESPHome's proven auto-connect/reconnect. The Auto switch toggles this at runtime.
    auto_connect: true

external_components:
  - source:
      type: local
      path: components

# Sync the ESP clock so the toilet's time-request (0x2A) gets a real timestamp.
time:
  - platform: sntp
    id: sntp_time
    timezone: "Europe/London"   # board-local time drives the 0x2B time-reply sent to the toilet

# Connection state. ble_auto mirrors the Auto switch (not persisted, so a reboot always tries to connect).
globals:
  - id: toilet_connected
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: toilet_connected_since
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: ble_auto
    type: bool
    restore_value: no
    initial_value: 'true'

sensowash_serial:
  id: sensowash
  ble_client_id: sensowash_ble
  # No key by default — the bridge enrolls on first connect: press the Bluetooth button on the toilet
  # and it discloses its key, which is then saved to flash. If you already know your toilet's key, add
  # it to secrets.yaml and uncomment the line below. See the README "Pairing" section.
  # handshake_key: !secret handshake_key
  status_led: status_led
  on_connect:
    - logger.log: "SensoWash connected"
    - lambda: |-
        id(toilet_connected) = true;
        id(toilet_connected_since) = millis();
  on_disconnect:
    - logger.log: "SensoWash disconnected"
    - lambda: 'id(toilet_connected) = false;'

button:
  - platform: sensowash_serial
    sensowash_serial_id: sensowash
    lid_toggle:
      name: "Toilet Lid Toggle"
    rear_wash:
      name: "Rear Wash"
    lady_wash:
      name: "Lady Wash"
    wash_stop:
      name: "Stop Wash"
    nozzle_self_clean:
      name: "Nozzle Self-Clean"
    nozzle_manual_clean:
      name: "Nozzle Manual Clean"
    descaling:
      name: "⚠️ Start Descaling"
  - platform: restart
    name: "Restart ESP Board"
    entity_category: config
  # Hidden maintenance endpoint — NOT shown in Home Assistant or the dashboard UI (internal). Clears the
  # stored pairing key from NVS and reboots so the bridge re-enrolls on next connect. Trigger via REST only:
  #   curl -X POST "http://sensowash-bridge.local/button/Forget%20Pairing%20Key/press"
  - platform: template
    name: "Forget Pairing Key"
    internal: true
    on_press:
      - lambda: 'id(sensowash)->forget_key();'
  # Manual BLE controls. Reconnect enables auto + connects; Disconnect disables auto + disconnects (stays off).
  # internal: the web dashboard's combined connect/disconnect widget drives these; HA uses the single
  # "Bluetooth" toggle (below) instead.
  - platform: template
    name: "Reconnect Bluetooth"
    icon: "mdi:bluetooth-connect"
    internal: true
    on_press:
      - lambda: |-
          id(ble_auto) = true;
          id(sensowash_ble)->set_auto_connect(true);
      - ble_client.connect:
          id: sensowash_ble
  - platform: template
    name: "Disconnect Bluetooth"
    icon: "mdi:bluetooth-off"
    internal: true
    on_press:
      - lambda: |-
          id(ble_auto) = false;
          id(sensowash_ble)->set_auto_connect(false);
      - ble_client.disconnect:
          id: sensowash_ble

switch:
  - platform: sensowash_serial
    sensowash_serial_id: sensowash
    auto_lid_open:
      name: "Auto Lid Open"
    auto_lid_close:
      name: "Auto Lid Close"
    beep:
      name: "Feedback Tones"
    energy_saving:
      name: "Energy Saving"
    comfort_wash:
      name: "Comfort Wash"
    holiday_mode:
      name: "Holiday Mode"
  # Auto-reconnect policy. ON: ESPHome auto-connects/reconnects. OFF: stops auto-reconnect (stays disconnected).
  # internal: the dashboard shows this (greyed when disconnected); HA uses the single "Bluetooth" toggle below.
  - platform: template
    name: "Auto Bluetooth Reconnect"
    icon: "mdi:bluetooth-transfer"
    internal: true
    lambda: 'return id(ble_auto);'
    turn_on_action:
      - lambda: |-
          id(ble_auto) = true;
          id(sensowash_ble)->set_auto_connect(true);
      - ble_client.connect:
          id: sensowash_ble
    turn_off_action:
      - lambda: |-
          id(ble_auto) = false;
          id(sensowash_ble)->set_auto_connect(false);
  # Home Assistant's single Bluetooth toggle: ON = connect (+ auto-reconnect), OFF = disconnect (stay off).
  - platform: template
    name: "Bluetooth"
    icon: "mdi:bluetooth"
    lambda: 'return id(ble_auto);'
    turn_on_action:
      - lambda: |-
          id(ble_auto) = true;
          id(sensowash_ble)->set_auto_connect(true);
      - ble_client.connect:
          id: sensowash_ble
    turn_off_action:
      - lambda: |-
          id(ble_auto) = false;
          id(sensowash_ble)->set_auto_connect(false);
      - ble_client.disconnect:
          id: sensowash_ble

select:
  - platform: sensowash_serial
    sensowash_serial_id: sensowash
    night_light:
      name: "Night Light"
    dryer:
      name: "Dryer"
    seat_temperature:
      name: "Seat Temperature"
    water_flow:
      name: "Water Flow"
    nozzle_position:
      name: "Nozzle Position"
    wash_water_temperature:
      name: "Wash Water Temperature"

sensor:
  - platform: sensowash_serial
    sensowash_serial_id: sensowash
    descaling_remaining:
      name: "Descaling Remaining"
    ble_rssi:
      name: "Toilet BLE Signal"
  # WiFi signal strength of the ESP board (dBm).
  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_rssi
    update_interval: 10s
  # How long the ESP board has been powered on (seconds). internal: feeds the dashboard's live
  # ticker; HA shows the human-readable "ESP Board Uptime" text sensor instead.
  - platform: uptime
    name: "ESP Board Uptime"
    id: board_uptime
    internal: true
    update_interval: 5s
  # How long the board has held the BLE link to the toilet (seconds; 0 when disconnected). internal:
  # feeds the dashboard ticker; HA shows the "Toilet Connected Time" text sensor instead.
  - platform: template
    name: "Toilet Connected Time"
    id: toilet_connected_time
    internal: true
    unit_of_measurement: s
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      if (id(toilet_connected))
        return (millis() - id(toilet_connected_since)) / 1000.0f;
      return 0.0f;

text_sensor:
  - platform: template
    name: "Build Version"
    id: build_version_ts
    icon: "mdi:tag"
    entity_category: diagnostic
    lambda: 'return {"${build_version}"};'
  # Human-readable board uptime (days/hours/minutes) for Home Assistant. The numeric seconds value
  # lives in the internal "ESP Board Uptime" sensor (dashboard ticker).
  - platform: template
    name: "ESP Uptime"
    icon: "mdi:timer-outline"
    entity_category: diagnostic
    update_interval: 60s
    lambda: |-
      float f = id(board_uptime).state;
      if (isnan(f)) return std::string("—");
      uint32_t s = (uint32_t) f, d = s / 86400; s %= 86400;
      uint32_t h = s / 3600; s %= 3600; uint32_t m = s / 60;
      char buf[40];
      if (d) snprintf(buf, sizeof(buf), "%ud %uh %um", (unsigned) d, (unsigned) h, (unsigned) m);
      else if (h) snprintf(buf, sizeof(buf), "%uh %um", (unsigned) h, (unsigned) m);
      else snprintf(buf, sizeof(buf), "%um", (unsigned) m);
      return std::string(buf);
  # Human-readable BLE link duration (days/hours/minutes) for Home Assistant; Diagnostic section.
  - platform: template
    name: "Toilet Connected Duration"
    icon: "mdi:timer-outline"
    entity_category: diagnostic
    update_interval: 60s
    lambda: |-
      if (!id(toilet_connected)) return std::string("Not connected");
      float f = id(toilet_connected_time).state;
      if (isnan(f)) return std::string("—");
      uint32_t s = (uint32_t) f, d = s / 86400; s %= 86400;
      uint32_t h = s / 3600; s %= 3600; uint32_t m = s / 60;
      char buf[40];
      if (d) snprintf(buf, sizeof(buf), "%ud %uh %um", (unsigned) d, (unsigned) h, (unsigned) m);
      else if (h) snprintf(buf, sizeof(buf), "%uh %um", (unsigned) h, (unsigned) m);
      else snprintf(buf, sizeof(buf), "%um", (unsigned) m);
      return std::string(buf);
  - platform: sensowash_serial
    sensowash_serial_id: sensowash
    serial_number:
      name: "Serial Number"
    software_version:
      name: "Software Version"
    hardware_version:
      name: "Hardware Version"
    descaling_state:
      name: "Descaling State"
    fault_codes:
      name: "Fault Codes"
    pairing_status:
      name: "Pairing Status"
      entity_category: config

binary_sensor:
  - platform: sensowash_serial
    sensowash_serial_id: sensowash
    seat_occupied:
      name: "Seat Occupied"
      device_class: occupancy
  # True while the ESP32 holds the BLE link to the toilet.
  - platform: template
    name: "Toilet Connected"
    id: toilet_connected_bs
    device_class: connectivity
    lambda: 'return id(toilet_connected);'
